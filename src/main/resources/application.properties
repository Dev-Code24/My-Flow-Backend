spring.application.name=my-flow
server.port=${PORT:8080}

# Server Instance ID (for distributed deployments)
# Uses HOSTNAME environment variable if available, otherwise generates a random UUID
server.instance.id=${HOSTNAME:server-${random.uuid}}

# CORS
spring.app.frontend-url=${FRONTEND_URL}

# JWT
security.jwt.secret-key=${JWT_KEY}
security.jwt.expiration-time=${JWT_EXPIRATION}

# Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# SSL Configuration for Neon
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# For Developing
# logging.level.org.springframework.security=DEBUG